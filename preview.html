<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunday? 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: "Poppins", "Segoe UI", system-ui, -apple-system, sans-serif;
    cursor: none;
    background: linear-gradient(120deg, #ffdde1 0%, #ee9ca7 50%, #ffc3a0 100%);
    background-size: 300% 300%;
    animation: gradientShift 14s ease infinite;
  }
  button { font-family: inherit; cursor: none; border: none; }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  main { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

  .stage {
    position: relative; z-index: 2; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 0 24px;
  }
  .question {
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 800; color: #5b1a3a;
    text-shadow: 0 4px 24px rgba(255,255,255,0.45);
    letter-spacing: -0.02em;
    animation: floaty 4s ease-in-out infinite;
  }
  .sunday {
    background: linear-gradient(90deg, #ff477e, #ff8c42, #ffd166);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    display: inline-block;
    animation: wiggle 2.4s ease-in-out infinite;
  }
  .sub { margin-top: 16px; color: #6b1d44; font-size: clamp(1rem, 2vw, 1.2rem); opacity: 0.8; }

  .btn-row {
    margin-top: 48px;
    display: flex; gap: 28px; align-items: center; flex-wrap: wrap; justify-content: center;
  }
  .yes-btn {
    padding: 18px 38px; font-size: 1.3rem; font-weight: 700;
    color: white;
    background: linear-gradient(135deg, #ff477e, #ff6b9d);
    border-radius: 999px;
    box-shadow: 0 12px 30px rgba(255,71,126,0.45), inset 0 -3px 0 rgba(0,0,0,0.15);
    transition: transform 180ms cubic-bezier(0.2,0.9,0.3,1.4), box-shadow 180ms ease;
    transform-origin: center;
  }
  .yes-btn:hover { box-shadow: 0 18px 40px rgba(255,71,126,0.55); }

  .no-btn {
    border: 2px solid #b84a73;
    background: rgba(255,255,255,0.7);
    color: #b84a73;
    padding: 14px 28px; font-size: 1rem; font-weight: 600;
    border-radius: 999px; backdrop-filter: blur(6px);
    transition: left 280ms cubic-bezier(0.2,0.9,0.3,1.4),
                top 280ms cubic-bezier(0.2,0.9,0.3,1.4),
                background 180ms ease;
  }
  .no-btn:hover { background: rgba(255,255,255,0.95); }

  .celebrate .yay {
    font-size: clamp(2.6rem, 8vw, 6rem); font-weight: 900;
    background: linear-gradient(90deg, #ff477e, #ffd166, #06d6a0, #ab7fff);
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: rainbow 3.5s linear infinite, pop 700ms ease-out;
  }
  .plan { margin-top: 20px; font-size: clamp(1.1rem, 2.2vw, 1.6rem); color: #5b1a3a; line-height: 1.5; }
  .time { font-weight: 800; color: #ff477e; }
  .hearts-burst { margin-top: 32px; font-size: clamp(2rem, 5vw, 3.2rem); display: flex; gap: 12px; }
  .hearts-burst span { animation: bob 1.4s ease-in-out infinite; }
  .hearts-burst span:nth-child(2){animation-delay:.15s;}
  .hearts-burst span:nth-child(3){animation-delay:.3s;}
  .hearts-burst span:nth-child(4){animation-delay:.45s;}
  .hearts-burst span:nth-child(5){animation-delay:.6s;}

  @keyframes floaty { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
  @keyframes wiggle { 0%,100%{transform:rotate(-2deg);} 50%{transform:rotate(2deg);} }
  @keyframes rainbow { 0%{background-position:0% 50%;} 100%{background-position:300% 50%;} }
  @keyframes pop { 0%{transform:scale(.4);opacity:0;} 60%{transform:scale(1.15);opacity:1;} 100%{transform:scale(1);} }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-6deg);} 50%{transform:translateY(-14px) rotate(6deg);} }

  .cursor-dot {
    position: fixed; width: 10px; height: 10px; border-radius: 50%;
    background: #ff1f6b; transform: translate(-50%,-50%);
    pointer-events: none; z-index: 9999;
    box-shadow: 0 0 12px rgba(255,31,107,0.75);
    transition: transform 80ms ease-out;
  }
  .cursor-ring {
    position: fixed; width: 42px; height: 42px; border-radius: 50%;
    border: 2px solid rgba(255,31,107,0.65);
    transform: translate(-50%,-50%);
    pointer-events: none; z-index: 9998;
    transition: transform 220ms ease-out, width 200ms ease, height 200ms ease;
    animation: ringPulse 1.6s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%,100%{box-shadow:0 0 0 0 rgba(255,31,107,0.35);}
    50%{box-shadow:0 0 0 10px rgba(255,31,107,0);}
  }

  .trail {
    position: fixed; pointer-events: none; z-index: 100;
    font-size: 22px; animation: trailFade 1.1s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes trailFade {
    0%{opacity:1;}
    100%{opacity:0; transform: translate(-50%,-120%) scale(.4) rotate(20deg);}
  }

  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(60px); opacity: 0.55; z-index: 1;
    animation: drift 18s ease-in-out infinite;
  }
  .blob1 { width: 420px; height: 420px; background: #ff9ec7; top: -120px; left: -80px; }
  .blob2 { width: 380px; height: 380px; background: #ffd3a5; bottom: -100px; right: -60px; animation-delay: -6s; }
  .blob3 { width: 300px; height: 300px; background: #c5a3ff; top: 50%; left: 60%; animation-delay: -12s; }
  @keyframes drift {
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(40px,-30px) scale(1.08);}
    66%{transform:translate(-30px,40px) scale(0.95);}
  }

  .confetti {
    position: fixed; top: -40px; font-size: 22px;
    animation: fall 3.5s linear forwards;
    pointer-events: none; z-index: 50;
  }
  @keyframes fall {
    0%{transform:translateY(-10vh) rotate(0deg); opacity: 1;}
    100%{transform:translateY(110vh) rotate(720deg); opacity: 0.9;}
  }
</style>
</head>
<body>
<main id="root">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div id="ask" class="stage">
    <h1 class="question">Would you go out with me on <span class="sunday">Sunday</span>?</h1>
    <p class="sub">(pick carefully 😉)</p>
    <div class="btn-row">
      <button id="yesBtn" class="yes-btn">Yes 💘</button>
      <button id="noBtn" class="no-btn">No</button>
    </div>
  </div>

  <div id="yay" class="stage celebrate" style="display:none;">
    <h1 class="yay">Yay!! 🎉💕</h1>
    <p class="plan">It's a date. Sunday it is. <br/>I'll pick you up at <span class="time">6pm</span> ✨</p>
    <div class="hearts-burst"><span>💖</span><span>💘</span><span>💕</span><span>💞</span><span>💗</span></div>
  </div>

  <div id="cursorDot" class="cursor-dot"></div>
  <div id="cursorRing" class="cursor-ring"></div>
</main>

<script>
  const TRAIL = ["💖","💗","💓","💘","💞","✨","🌸"];
  const TAUNTS = ["No","Are you sure?","Really?","Please reconsider 🥺","Think again!","You don't mean it...","Come on!","One more chance?","Pretty please?","Last try 🥺"];
  const CONF_EMOJIS = ["💖","💘","💕","🌸","✨","🌷","🎉","💝"];
  const CONF_COLORS = ["#ff6b9d","#ffd166","#06d6a0","#ab7fff","#ff8c42"];

  const dot = document.getElementById("cursorDot");
  const ring = document.getElementById("cursorRing");
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
  const ask = document.getElementById("ask");
  const yay = document.getElementById("yay");

  let yesScale = 1;
  let noIndex = 0;
  let lastTrail = 0;
  let yesClicked = false;

  window.addEventListener("mousemove", (e) => {
    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";
    ring.style.left = e.clientX + "px";
    ring.style.top = e.clientY + "px";

    const now = performance.now();
    if (now - lastTrail > 55) {
      lastTrail = now;
      const el = document.createElement("span");
      el.className = "trail";
      el.textContent = TRAIL[Math.floor(Math.random() * TRAIL.length)];
      const scale = (0.7 + Math.random() * 0.8).toFixed(2);
      el.style.left = (e.clientX + (Math.random() - 0.5) * 24) + "px";
      el.style.top = (e.clientY + (Math.random() - 0.5) * 24) + "px";
      el.style.transform = `translate(-50%, -50%) scale(${scale})`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1100);
    }

    if (!yesClicked) {
      const r = noBtn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < 140) {
        const pad = 30;
        const maxX = window.innerWidth - r.width - pad;
        const maxY = window.innerHeight - r.height - pad;
        let nx = Math.random() * (maxX - pad) + pad;
        let ny = Math.random() * (maxY - pad) + pad;
        if (Math.hypot(nx - e.clientX, ny - e.clientY) < 220) {
          nx = (e.clientX + window.innerWidth / 2) % maxX;
          ny = (e.clientY + window.innerHeight / 2) % maxY;
        }
        noBtn.style.position = "fixed";
        noBtn.style.left = nx + "px";
        noBtn.style.top = ny + "px";
        noIndex = Math.min(noIndex + 1, TAUNTS.length - 1);
        noBtn.textContent = TAUNTS[noIndex];
      }
    }
  });

  yesBtn.addEventListener("mouseenter", () => {
    yesScale = Math.min(yesScale * 1.12, 3.5);
    yesBtn.style.transform = `scale(${yesScale}) rotate(${(yesScale - 1) * 4}deg)`;
  });

  yesBtn.addEventListener("click", () => {
    yesClicked = true;
    ask.style.display = "none";
    yay.style.display = "flex";
    for (let i = 0; i < 80; i++) {
      const c = document.createElement("span");
      c.className = "confetti";
      c.textContent = CONF_EMOJIS[i % CONF_EMOJIS.length];
      c.style.left = (Math.random() * 100) + "%";
      c.style.color = CONF_COLORS[i % CONF_COLORS.length];
      c.style.animationDelay = (Math.random() * 1.2) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4800);
    }
  });

  noBtn.addEventListener("click", (e) => e.preventDefault());
</script>
</body>
</html>
